name: Deploy Frontend to QA

on:
  push:
    branches:
      - feature/Healthcare

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy on QA Server
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'http://10.13.1.180:8990' }}
          VITE_KEYCLOAK_BASE_URL: ${{ vars.VITE_KEYCLOAK_BASE_URL || 'http://10.13.1.180:8180' }}
          VITE_KEYCLOAK_REALM: ${{ vars.VITE_KEYCLOAK_REALM || 'Healthcare-QA' }}
          VITE_KEYCLOAK_CLIENT_ID: ${{ vars.VITE_KEYCLOAK_CLIENT_ID || 'Healthcare-QA' }}
        run: |
          set -e

          cd $GITHUB_WORKSPACE

          # Stop old container if exists
          docker stop healthcare-frontend || true
          docker rm healthcare-frontend || true

          # Stop anything using port 3001
          docker ps -q --filter "publish=3001" | xargs -r docker stop
          docker ps -a -q --filter "publish=3001" | xargs -r docker rm

          # Build with env vars injected as build args
          docker build \
            --build-arg VITE_API_BASE_URL=$VITE_API_BASE_URL \
            --build-arg VITE_KEYCLOAK_BASE_URL=$VITE_KEYCLOAK_BASE_URL \
            --build-arg VITE_KEYCLOAK_REALM=$VITE_KEYCLOAK_REALM \
            --build-arg VITE_KEYCLOAK_CLIENT_ID=$VITE_KEYCLOAK_CLIENT_ID \
            -t healthcare-frontend .

          # Run container
          docker run -d --name healthcare-frontend -p 3001:80 healthcare-frontend

      - name: Clean up dangling images
        run: docker image prune -f

      - name: Verify deployment
        run: |
          echo "Waiting for nginx to start..."
          sleep 5
          curl --fail --silent --max-time 10 http://localhost:3001/ais/ || echo "Frontend not reachable yet"
