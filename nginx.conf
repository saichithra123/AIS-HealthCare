server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Use relative redirects so port is preserved (e.g. :3001)
    absolute_redirect off;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SPA routing — serve index.html for all /ais/* routes
    location /ais {
        alias /usr/share/nginx/html/ais;
        try_files $uri $uri/ /ais/index.html;

        # Cache hashed static assets (js, css) for 1 year
        location ~* \.(?:js|css|woff2?|ttf|eot|ico|svg|png|jpg|jpeg|gif|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # Redirect root to /ais/
    location = / {
        return 301 /ais/;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
